<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatZMX</title>
<meta name="description" content="ChatZMX — an AI persona chatbot that talks like Minxuan Zhang herself: her tone, her catchphrases, her way of thinking.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --baby-blue: #8ecae6;
    --baby-blue-dark: #5fa8d3;
    --pink: #f7b2c4;
    --cream: #faf7f2;
    --ink: #1f2937;
    --ink-soft: #4b5563;
    --border: #e6ddd0;
    --radius: 18px;
    --shadow: 0 8px 24px rgba(31, 41, 55, 0.06);
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 44px 18px;
  }

  .page {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .logo-badge {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: clamp(1.8rem, 6vw, 2.4rem);
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, var(--baby-blue-dark), var(--pink));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .sub {
    color: var(--ink-soft);
    text-align: center;
    max-width: 460px;
    margin-bottom: 22px;
    font-size: 0.95rem;
  }

  .disclaimer-badge {
    font-size: 0.75rem;
    color: var(--ink-soft);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    margin-bottom: 20px;
  }

  #chat-widget{width:100%;max-width:560px;border:1px solid var(--border);border-radius:var(--radius);
    overflow:hidden;background:#fff;box-shadow:var(--shadow);}
  #chat-header{background:linear-gradient(90deg,#0f2b46,#3a5f80);color:#fff;padding:1.1rem 1.3rem;font-weight:700;font-size:1.05rem;}
  #chat-header small{display:block;font-weight:400;color:#bcd9ec;font-size:.8rem;margin-top:.2rem;}
  #chat-log{height:440px;overflow-y:auto;padding:1.2rem;background:#f8f9fb;}
  .msg{margin:.5rem 0;padding:.65rem .9rem;border-radius:14px;max-width:85%;line-height:1.55;
    font-size:.95rem;white-space:pre-wrap;}
  .msg.user{background:#2563eb;color:#fff;margin-left:auto;border-bottom-right-radius:3px;}
  .msg.bot{background:#fff;border:1px solid #e2e8f0;color:#1f2d3d;border-bottom-left-radius:3px;}
  .msg.bot.thinking{color:#94a3b8;font-style:italic;}
  #chat-form{display:flex;border-top:1px solid var(--border);}
  #chat-input{flex:1;border:none;padding:1rem 1.1rem;font-size:.95rem;font-family:inherit;outline:none;}
  #chat-send{border:none;background:#0f2b46;color:#fff;padding:0 1.5rem;font-size:.95rem;
    font-family:inherit;cursor:pointer;font-weight:600;}
  #chat-send:disabled{background:#94a3b8;cursor:default;}
  #chat-disclaimer{font-size:.72rem;color:#94a3b8;text-align:center;padding:.6rem;background:#f8f9fb;}

  .portfolio-link {
    margin-top: 26px;
    font-size: 0.9rem;
    color: var(--ink-soft);
  }

  .portfolio-link a {
    color: var(--baby-blue-dark);
    font-weight: 600;
    text-decoration: none;
  }

  .portfolio-link a:hover { text-decoration: underline; }

  @media (max-width: 480px) {
    #chat-log { height: 360px; }
  }
</style>
</head>
<body>

<div class="page">
  <p class="logo-badge">ChatZMX</p>
  <p class="sub">跟"数字版敏轩"聊聊 —— 语气、口头禅、想法都尽量像我本人。它只用我自己说过的话来回答,不是真人,也不代表我本人做任何承诺。</p>
  <p class="disclaimer-badge">⚠️ AI 角色扮演,不是真人张敏轩本人在回复</p>

  <div id="chat-widget">
    <div id="chat-header">ChatZMX<small>用第一人称"我"聊天,尽量还原本人的语气和想法</small></div>
    <div id="chat-log"></div>
    <form id="chat-form">
      <input id="chat-input" type="text" placeholder="想聊点什么呀…" autocomplete="off" maxlength="1000" />
      <button id="chat-send" type="submit">发送</button>
    </form>
    <div id="chat-disclaimer">AI 角色扮演助手,每条消息独立回答,不保存聊天记录。</div>
  </div>

  <p class="portfolio-link">正式简历版机器人在 <a href="/chatbot">Ask Me</a> · 完整作品集见 <a href="/">portfolio</a></p>
</div>

<script>
  const log = document.getElementById('chat-log');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');

  function addMessage(text, who, extraClass = '') {
    const el = document.createElement('div');
    el.className = 'msg ' + who + (extraClass ? ' ' + extraClass : '');
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';
    sendBtn.disabled = true;
    const thinking = addMessage('想想…', 'bot', 'thinking');

    try {
      const res = await fetch('/api/chatzmx', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: question }),
      });
      const data = await res.json();
      thinking.remove();
      addMessage(data.reply || data.error || '出了点问题,再试一次呗。', 'bot');
    } catch (err) {
      thinking.remove();
      addMessage('连不上,再试一次呗。', 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
